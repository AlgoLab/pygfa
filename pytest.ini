[tool:pytest]
# Test discovery
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration - all to results/test/
addopts = 
    --junit-xml=results/test/junit.xml
    --html=results/test/report.html
    --self-contained-html
    --tb=short
    --cov=pygfa
    --cov-report=html:results/test/htmlcov
    --cov-report=xml:results/test/coverage.xml

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# File logging
log_file = results/test/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s: %(filename)s:%(lineno)d: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S