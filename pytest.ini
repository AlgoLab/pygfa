[tool:pytest]
# Test discovery
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# LLM-friendly debugging configuration - all output to terminal
addopts = 
    -v
    -s
    --full-trace
    --tb=long
    --strict-markers
    --color=yes

# Terminal logging for immediate debugging visibility
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(filename)s:%(lineno)d: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
