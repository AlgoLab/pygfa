[project]
name = "pygfa"
requires-python = ">=3.13"

[tool.pixi.project]
name = "pygfa"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]
authors = ["Gianluca Della Vedova <gianluca@dellavedova.org>"]
version = "0.1.0"

[tool.pixi.feature.test.dependencies]
pytest = "*"

[tool.pixi.feature.test.tasks]
test = "pytest"

[tool.pixi.environments]
test = ["test"]

[tool.pixi.dependencies]
networkx = ">=3.5,<4"
jupyterlab = ">=4.4.5,<5"
pandas = ">=2.3.1,<3"
biopython = ">=1.85,<2"
matplotlib = ">=3.10.3,<4"
zstd = ">=1.5.7,<2"
python-lsp-server = ">=1.13.0,<2"
pyzstd = ">=0.17.0,<0.18"
lark = ">=1.2.2,<2"
