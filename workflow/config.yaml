# Configuration for single-parameter BGFA benchmarking workflow
# Tests each section independently with all relevant encodings and block sizes
# Section types: integer (uints), string (strings), cigar, walk

# =============================================================================
# Integer encodings (uints)
# =============================================================================
integer_encodings:
  - identity
  - varint
  - fixed16
  - fixed32
  - fixed64
  - delta
  - gamma
  - omega
  - golomb
  - rice
  - streamvbyte
  - vbyte

# =============================================================================
# String encodings (strings)
# =============================================================================
string_encodings:
  - identity
  - zstd
  - gzip
  - lzma
  - lz4
  - brotli
  - huffman
  - frontcoding
  - delta
  - dictionary
  - rle
  - arithmetic
  - bwt_huffman

# =============================================================================
# CIGAR encodings (cigar strings)
# =============================================================================
cigar_encodings:
  - identity
  - zstd
  - gzip
  - lzma

# =============================================================================
# Walk encodings (walks)
# =============================================================================
walk_encodings:
  - identity
  - zstd
  - gzip
  - lzma

# =============================================================================
# Section-specific config
# Only specify type: integer, string, cigar, or walk
# =============================================================================
section_specific:
  segment_names_header:
    type: string
  segment_names_payload_lengths:
    type: integer
  segment_names_payload_names:
    type: string
  segments_header:
    type: string
  segments_payload_lengths:
    type: integer
  segments_payload_strings:
    type: string
  links_header:
    type: string
  links_payload_from:
    type: integer
  links_payload_to:
    type: integer
  links_payload_cigar_lengths:
    type: integer
  links_payload_cigar:
    type: cigar
  paths_header:
    type: string
  paths_payload_names:
    type: string
  paths_payload_segment_lengths:
    type: integer
  paths_payload_path_ids:
    type: walk
  paths_payload_cigar_lengths:
    type: integer
  paths_payload_cigar:
    type: cigar
  walks_header:
    type: string
  walks_payload_sample_ids:
    type: string
  walks_payload_hep_indices:
    type: integer
  walks_payload_sequence_ids:
    type: string
  walks_payload_start:
    type: integer
  walks_payload_end:
    type: integer
  walks_payload_walks:
    type: walk

# =============================================================================
# Block sizes
# Powers of 2 from 2^9 to 2^15 (max for uint16)
# =============================================================================
block_sizes:
  - 512
  - 1024
  - 2048
  - 4096
  - 8192
  - 16384
  - 32768

# =============================================================================
# Output Configuration
# =============================================================================
output_dir: results/benchmark
