# Configuration for BGFA benchmarking workflow

# =============================================================================
# Block sizes
# Powers of 2 from 2^9 to 2^15 (max for uint16)
# =============================================================================
block_sizes:
  - 512
  - 1024
  - 2048
  - 4096
  - 8192
  - 16384
  - 32768

# =============================================================================
# Output Configuration
# =============================================================================
output_dir: results/benchmark

# =============================================================================
# Memory Limit
# Maximum memory (in MB) available for benchmark jobs.
# Snakemake uses this to schedule jobs without exceeding total memory.
# Override on CLI: --config memory_limit_mb=8192
# =============================================================================
memory_limit_mb: 4096
